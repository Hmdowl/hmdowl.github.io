<!-- Social bar — avant le footer -->
<div class="pre-footer-social">
  <a href="{{ site.author.linkedin | default: '#' }}" class="pre-footer-link pre-footer-link--linkedin" title="LinkedIn" {% if site.author.linkedin and site.author.linkedin != '' %}target="_blank" rel="noopener"{% endif %}>
    <i class="fab fa-linkedin"></i>
  </a>
  <a href="{{ site.author.discord | default: '#' }}" class="pre-footer-link pre-footer-link--discord" title="Discord" {% if site.author.discord and site.author.discord != '' %}target="_blank" rel="noopener"{% endif %}>
    <i class="fab fa-discord"></i>
  </a>
  <a href="{% if site.author.github and site.author.github != '' %}https://github.com/{{ site.author.github }}{% else %}#{% endif %}" class="pre-footer-link pre-footer-link--github" title="GitHub" {% if site.author.github and site.author.github != '' %}target="_blank" rel="noopener"{% endif %}>
    <i class="fab fa-github"></i>
  </a>
  <a href="{% if site.author.email and site.author.email != '' %}mailto:{{ site.author.email }}{% else %}#{% endif %}" class="pre-footer-link pre-footer-link--email" title="Email">
    <i class="fas fa-envelope"></i>
  </a>
</div>

<footer class="site-footer">
  <div class="container">

    <!-- Copyright -->
    <div class="footer-copy">
      ©2026 - Généré avec <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a> | Tous droits réservés
    </div>

  </div>
</footer>
